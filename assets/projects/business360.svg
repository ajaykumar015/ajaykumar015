<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bbg" x1="0" y1="0" x2="0" y2="500">
      <stop offset="0%" stop-color="#0F1830"/>
      <stop offset="100%" stop-color="#0A0F1E"/>
    </linearGradient>
  </defs>
  <rect width="900" height="500" rx="18" fill="url(#bbg)" stroke="#26314A"/>

  <text x="40" y="55" font-family="'Segoe UI Semibold',Arial,sans-serif" font-size="26" font-weight="700" fill="#EAF0FA">Business 360</text>
  <text x="40" y="80" font-family="Consolas,monospace" font-size="13" letter-spacing="2" fill="#F2B807">POWER BI · SQL · DAX</text>
  <line x1="40" y1="100" x2="860" y2="100" stroke="#26314A"/>

  <!-- Revenue trend line chart -->
  <g transform="translate(40,120)">
    <rect width="520" height="180" rx="10" fill="#121A2E" stroke="#26314A"/>
    <text x="18" y="26" font-family="Consolas,monospace" font-size="11" letter-spacing="2" fill="#7C8BA8">REVENUE TREND — ONLINE VS IN-STORE</text>
    <g stroke="#26314A" stroke-width="1">
      <line x1="18" y1="60" x2="500" y2="60"/>
      <line x1="18" y1="100" x2="500" y2="100"/>
      <line x1="18" y1="140" x2="500" y2="140"/>
    </g>
    <polyline points="30,120 100,100 170,110 240,70 310,85 380,45 450,60"
              fill="none" stroke="#2FD3C8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="30,150 100,140 170,130 240,135 310,105 380,110 450,90"
              fill="none" stroke="#F2B807" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="20" cy="60" r="4" fill="#2FD3C8"/><text x="30" y="64" font-family="Consolas,monospace" font-size="10" fill="#7C8BA8">E-commerce</text>
    <circle cx="140" cy="60" r="4" fill="#F2B807"/><text x="150" y="64" font-family="Consolas,monospace" font-size="10" fill="#7C8BA8">Brick &amp; Mortar</text>
  </g>

  <!-- KPI stack -->
  <g transform="translate(580,120)" font-family="Consolas,monospace">
    <rect width="280" height="180" rx="10" fill="#121A2E" stroke="#26314A"/>
    <text x="18" y="26" font-size="11" letter-spacing="2" fill="#7C8BA8">EXECUTIVE KPIS</text>
    <text x="18" y="60" font-size="22" font-weight="700" fill="#EAF0FA">$4.8M</text>
    <text x="18" y="78" font-size="11" fill="#7C8BA8">Total Revenue</text>
    <text x="150" y="60" font-size="22" font-weight="700" fill="#2FD3C8">+12.4%</text>
    <text x="150" y="78" font-size="11" fill="#7C8BA8">YoY Growth</text>
    <text x="18" y="120" font-size="22" font-weight="700" fill="#F2B807">38.2K</text>
    <text x="18" y="138" font-size="11" fill="#7C8BA8">Active Customers</text>
    <text x="150" y="120" font-size="22" font-weight="700" fill="#F26D5B">2.9%</text>
    <text x="150" y="138" font-size="11" fill="#7C8BA8">Churn Rate</text>
  </g>

  <!-- regional bar chart -->
  <g transform="translate(40,330)">
    <rect width="820" height="130" rx="10" fill="#121A2E" stroke="#26314A"/>
    <text x="18" y="24" font-family="Consolas,monospace" font-size="11" letter-spacing="2" fill="#7C8BA8">SALES BY REGION</text>
    <g>
      <rect x="30"  y="50" width="40" height="60" rx="3" fill="#2FD3C8"/>
      <rect x="110" y="35" width="40" height="75" rx="3" fill="#2FD3C8"/>
      <rect x="190" y="60" width="40" height="50" rx="3" fill="#F2B807"/>
      <rect x="270" y="25" width="40" height="85" rx="3" fill="#2FD3C8"/>
      <rect x="350" y="70" width="40" height="40" rx="3" fill="#F26D5B"/>
      <rect x="430" y="45" width="40" height="65" rx="3" fill="#2FD3C8"/>
      <rect x="510" y="55" width="40" height="55" rx="3" fill="#F2B807"/>
      <rect x="590" y="30" width="40" height="80" rx="3" fill="#2FD3C8"/>
      <rect x="670" y="65" width="40" height="45" rx="3" fill="#F26D5B"/>
      <rect x="750" y="40" width="40" height="70" rx="3" fill="#2FD3C8"/>
    </g>
    <text x="18" y="120" font-family="Consolas,monospace" font-size="10" fill="#7C8BA8">North · South · East · West · Central · Online (×2) · APAC · EU · LATAM</text>
  </g>
</svg>
